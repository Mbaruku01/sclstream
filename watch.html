<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCL MUSEUM | Cinema Experience</title>

    <link rel="icon" type="image/png" sizes="32x32" href="pic/logo.png">
    <link rel="icon" type="image/png" sizes="16x16" href="pic/logo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="pic/logo.png">
    <link rel="shortcut icon" href="pic/logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { background-color: #020617; color: white; font-family: 'Inter', sans-serif; margin: 0; }
        .video-container { aspect-ratio: 16 / 9; width: 100%; transition: aspect-ratio 0.5s ease; }
        .video-container.is-short { aspect-ratio: 9 / 16; max-width: 400px; margin: 0 auto; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .text-mint { color: #2AF598; }
        .btn-interact { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }
        .btn-interact:hover { background: rgba(255, 255, 255, 0.1); border-color: #2AF598; transform: translateY(-2px); }
    </style>
</head>
<body class="min-h-screen bg-[#020617]">

    <header class="p-4 md:px-10 flex justify-between items-center border-b border-white/5 bg-[#020617]/80 sticky top-0 z-50 backdrop-blur-md">
        <a href="index.html" class="flex items-center gap-2 text-slate-400 hover:text-white transition-all group">
            <i data-lucide="arrow-left" class="w-5 h-5 group-hover:-translate-x-1 transition-transform"></i>
            <span class="font-bold tracking-widest text-[10px] uppercase">Exit Vault</span>
        </a>
        <div class="flex items-center gap-2">
            <span class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em]">SCL Museum Cinema</span>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto flex flex-col lg:flex-row gap-8 p-4 md:p-8">
        
        <div class="flex-1">
            <div id="playerContainer" class="video-container glass rounded-[2rem] overflow-hidden shadow-2xl ring-1 ring-white/10">
                <iframe id="player" class="w-full h-full" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>

            <div class="mt-6 space-y-6">
                <h1 id="videoTitle" class="text-2xl md:text-4xl font-black">Archive Title</h1>
                
                <div class="flex flex-wrap items-center justify-between gap-6 py-5 border-y border-white/5">
                    <div class="flex items-center gap-4">
                        <div class="w-14 h-14 rounded-full bg-gradient-to-tr from-[#08AEEA] to-[#2AF598] p-0.5 shadow-lg">
                            <img src="pic/logo.png" class="w-full h-full rounded-full object-cover bg-slate-900">
                        </div>
                        <div class="space-y-1">
                            <p class="font-black text-base tracking-tight uppercase">SHIMULIMULI</p>
                        </div>
                    </div>

                    <div class="flex items-center gap-3">
                        <button onclick="goToYouTube()" class="btn-interact flex items-center gap-2 px-6 py-3 rounded-full text-sm font-bold">
                            <i data-lucide="thumbs-up" class="w-4 h-4 text-mint"></i> Like
                        </button>
                        <button onclick="copyLink()" class="btn-interact flex items-center gap-2 px-6 py-3 rounded-full text-sm font-bold">
                            <i data-lucide="share-2" class="w-4 h-4"></i> Share
                        </button>
                    </div>
                </div>

                <div class="glass p-6 rounded-3xl">
                    <div class="flex items-center gap-2 mb-3">
                        <span id="videoTag" class="px-3 py-1 bg-white/5 text-mint text-[9px] font-black rounded-md border border-white/10 uppercase tracking-widest">TAG</span>
                        <span class="text-slate-500 text-[9px] font-bold uppercase tracking-widest">Verified SHIMULIMULI Archive</span>
                    </div>
                    <p id="videoDesc" class="text-slate-400 leading-relaxed font-light text-base md:text-lg">Loading metadata...</p>
                </div>
            </div>
        </div>

        <div class="w-full lg:w-[400px] space-y-6">
            <h3 class="text-xs font-black uppercase tracking-widest text-slate-500">More from the Archive</h3>
            <div id="suggestionsList" class="space-y-5"></div>
        </div>
    </main>

    <script>
    const contentData = [
        // LANDSCAPE CONTENT (Recently Added)
        { title: "THE CULTURAL ECHOES 2025: A Collaboration Between Shimulimuli and The Open University of Tanzania", tag: "PARTNERSHIP PROJECT", img: "pic/flomi2.JPG", vID: "L7lVp9t2vS0" }, // Added vID placeholder
        { title: "Pare Traditional Cuisine: Authentic Flavors and Heritage from the Pare Mountains", tag: "Cuisine", img: "pic/vid1.jpg", vID: "kHeJ74uLe_U" },
        { title: "The Migration of the Ngoni Tribe: Professor Gastor Mapunda (Chief Advisor, Shimulimuli)", tag: "History", img: "pic/vid2.jpg", vID: "h1s9dXYZq0g" },
        { title: "Shimulimuli & The Open University of Tanzania Workshop: Insights from CEO Felician Tomeka", tag: "Workshop", img: "pic/thumbnail.png", vID: "mQJ9PjCaQ3E" },
        { title: "Chance Ezekiel of the National Museum at the Open University of Tanzania & Shimulimuli Workshop", tag: "Workshop", img: "pic/thumbnail.png", vID: "RHOpTKrso9o" },
        { title: "Inside Tanzania’s National Museum | Culture, History & Heritage", tag: "Museum", img: "pic/nmt.webp", vID: "vEWPPTGXDWs" },
        { title: "Sacred Pare Dance Performances | Traditional Ceremonies in Tanzania", tag: "Pare", img: "pic/vid4.jpg", vID: "5LFhCxWmB6Q" },
        
        // Tribes
        { title: "Livestock Keeping in Pare Land 🇹🇿 | Traditional Farming in Tanzania", tag: "Farming", img: "pic/vid5.jpg", vID: "1F3myf-eo-k" },
        { title: "Pare Traditional Food Preparation | Authentic Tanzanian Cuisine", tag: "Pare", img: "pic/vid6.jpg", vID: "cTdXcmM2DiY" },
        { title: "Makonde Tribe Traditional Dance – Tanzania Culture at Its Best", tag: "Makonde", img: "pic/makonde.JPG", vID: "wXWLRqz7VXY" },
        { title: "Bama: The Special Ceremonial Dance of the Makonde | Newala, Mtwara", tag: "Makonde", img: "pic/vid7.jpg", vID: "W1CozcRms4k" },
        { title: "The Hidden Sanctuary: Spiritual Oral History with Mfumwa Wajani Kibacha", tag: "History", img: "pic/vid8.webp", vID: "15MQScw7Lfw" },
        { title: "The Spirit of the Makonde: Traditional Dance Ceremony in Newala", tag: "Makonde", img: "pic/vid9.jpg", vID: "lTzdUBh2D64" },
        
        // Herbal/Nature
        { title: "The Heart of Meru Heritage: Exploring the Makumira Institute, Arusha", tag: "Meru", img: "pic/vid10.jpg", vID: "Bm-XIue9ETI" },
        { title: "Visiting the Home of a Renowned Traditional Healer in Kisesa, Mwanza", tag: "Healer", img: "pic/vid11.webp", vID: "OIT_2Mtn2uI" },
        { title: "Inside Lake Duluti: Behind Arusha's Crater Lake", tag: "Arusha", img: "pic/vid12.webp", vID: "FhKYhNsoMkM" },
        { title: "Hiking the Vidunda Mountains in Search of Ancient Traditions", tag: "Vidunda", img: "pic/vid13.jpg", vID: "ufrcnCxwXhw" },
        { title: "A Hidden Waterfall in Vidunda, Morogoro!", tag: "Nature", img: "pic/vid14.png", vID: "qovz2xfWn0Y" },

        // CULTURAL SHORTS
        { title: "Meru - Arusha | Nringeringe Dance Group", tag: "Meru", img: "pic/shorts1.jpg", vID: "I6-iAIeYm2Q", isShort: true },
        { title: "Exploring the Cultural Arts Center (CAC) at Makumira Institute, Arusha | 03", tag: "Arusha", img: "pic/shorts2.jpg", vID: "Vsmt_c45hXI", isShort: true },
        { title: "Exploring the Cultural Arts Center (CAC) at Makumira Institute, Arusha | 02", tag: "Arusha", img: "pic/shorts3.jpg", vID: "L9DTEWWMDvI", isShort: true },
        { title: "Exploring the Cultural Arts Center (CAC) at Makumira Institute, Arusha", tag: "Arusha", img: "pic/shorts4.jpg", vID: "xHRIlMHAs1o", isShort: true },
        { title: "KWIZU MOUNTAINS | SAME KILIMANJARO", tag: "Kilimanjaro", img: "pic/kwizu.jpg", vID: "Pt30DBBxB7A", isShort: true },
        { title: "Preserving Tanzanian History | Makumira Cultural Archives Tour", tag: "Archives", img: "pic/shorts5.jpg", vID: "LXj3rFzw19o", isShort: true },
        { title: "The Duluti Lake: Where Nature Meets Culture", tag: "Nature", img: "pic/shorts6.jpg", vID: "7RELyso8eig", isShort: true },
        { title: "Welcome to Lake Duluti with ZAKIA MPODI", tag: "Culture", img: "pic/shorts7.jpg", vID: "ScllVEM8cpE", isShort: true }
    ];

    window.onload = () => {
        if (typeof lucide !== 'undefined') lucide.createIcons();
        
        const urlParams = new URLSearchParams(window.location.search);
        const vID = urlParams.get('v');
        const vTitle = urlParams.get('t');
        const vTag = urlParams.get('tag');
        const vDesc = urlParams.get('d');

        if (vID) {
            const currentVideo = contentData.find(i => i.vID === vID);
            const playerContainer = document.getElementById('playerContainer');
            
            if(currentVideo && currentVideo.isShort) {
                if(playerContainer) playerContainer.classList.add('is-short');
            } else {
                if(playerContainer) playerContainer.classList.remove('is-short');
            }
            
            document.getElementById('player').src = `https://www.youtube.com/embed/${vID}?autoplay=1&modestbranding=1&rel=0`;
            document.getElementById('videoTitle').innerText = decodeURIComponent(vTitle) || "SHIMULIMULI Archive";
            document.getElementById('videoTag').innerText = decodeURIComponent(vTag) || "Culture";
            document.getElementById('videoDesc').innerText = decodeURIComponent(vDesc) || "Exploring Tanzanian heritage.";
            renderSuggestions(decodeURIComponent(vTitle));
        } else {
            window.location.href = 'index.html';
        }
    };

    function renderSuggestions(currentTitle) {
        const list = document.getElementById('suggestionsList');
        if(!list) return;
        
        list.innerHTML = contentData
            .filter(item => item.title !== currentTitle)
            .map(item => `
                <div onclick="playNext('${item.vID}', '${item.title.replace(/'/g, "\\'")}', '${item.tag}')" class="flex gap-4 group cursor-pointer">
                    <div class="relative w-32 h-20 md:w-40 md:h-24 flex-shrink-0 rounded-[1.5rem] overflow-hidden ring-1 ring-white/10 shadow-lg">
                        <img src="${item.img}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                        <div class="absolute bottom-2 right-2 p-1 bg-black/60 backdrop-blur-md rounded text-[8px] font-bold">${item.isShort ? 'SHORT' : '4K'}</div>
                    </div>
                    <div class="flex-1 py-1">
                        <h4 class="text-xs md:text-sm font-bold leading-tight group-hover:text-mint transition-colors line-clamp-2 text-white">${item.title}</h4>
                        <p class="text-[9px] text-slate-500 uppercase mt-2 font-black tracking-tighter">${item.tag}</p>
                    </div>
                </div>
            `).join('');
    }

    function playNext(v, t, tag) {
        const d = `SHIMULIMULI Heritage Archive: ${t}. Exploring ${tag} culture in 4K resolution.`;
        window.location.href = `watch.html?v=${v}&t=${encodeURIComponent(t)}&tag=${encodeURIComponent(tag)}&d=${encodeURIComponent(d)}`;
    }

    function goToYouTube() {
        const vID = new URLSearchParams(window.location.search).get('v');
        window.open(`https://www.youtube.com/watch?v=${vID}`, '_blank');
    }

    function copyLink() {
        navigator.clipboard.writeText(window.location.href);
        alert("Archive Link Copied");
    }
</script>
</body>
</html>
